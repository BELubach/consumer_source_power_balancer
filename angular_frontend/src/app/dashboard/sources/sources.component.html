<section class="grid gap-6 rounded-[24px]">
    <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">

        <div class="space-y-2">
            <p class="text-2xl font-bold ">Sources</p>
        </div>
    </div>
    <div class="card flex justify-center">
        <div class="flex flex-wrap gap-4">
            <div class="flex items-center">
                <p-radiobutton name="requestedPower" value="requestedPower" [(ngModel)]="selectedDataset"
                    inputId="requestedPower" />
                <label for="requestedPower" class="ml-2">Requested Power</label>
            </div>
            <div class="flex items-center">
                <p-radiobutton name="capacity" value="capacity" [(ngModel)]="selectedDataset" inputId="capacity" />
                <label for="capacity" class="ml-2">Capacity</label>
            </div>

        </div>
    </div>


    <div class="">
        <h2 class=""> Shown dataset: {{ selectedDataset() }}
        </h2>
        <app-barchartcomponent [chartData]="chartData()"></app-barchartcomponent>

    </div>

</section>
